  <!-- HTML -->
  <rect x="160" y="144" width="52" height="22" rx="11" fill="url(#pillGrad)" stroke="#4ade80" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="186" y="159" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#dcfce7">HTML</text>

  <!-- CSS -->
  <rect x="218" y="144" width="46" height="22" rx="11" fill="url(#pillGrad)" stroke="#4ade80" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="241" y="159" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#dcfce7">CSS</text>

  <!-- PHP -->
  <rect x="270" y="144" width="46" height="22" rx="11" fill="url(#pillGrad)" stroke="#4ade80" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="293" y="159" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#dcfce7">PHP</text>

  <!-- JavaScript -->
  <rect x="322" y="144" width="80" height="22" rx="11" fill="url(#pillGrad)" stroke="#4ade80" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="362" y="159" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#dcfce7">JavaScript</text>

