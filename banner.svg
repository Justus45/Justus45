  <rect x="408" y="144" width="44" height="22" rx="11" fill="url(#pillGrad)" stroke="#4ade80" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="430" y="159" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#dcfce7">SQL</text>

