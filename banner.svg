<svg xmlns="http://www.w3.org/2000/svg" width="860" height="280" viewBox="0 0 860 280">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2e0a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a5c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d8a1e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.07" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02" />
    </linearGradient>
    <linearGradient id="pillGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="280" rx="16" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="70" x2="860" y2="70" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="140" x2="860" y2="140" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="210" x2="860" y2="210" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="215" y1="0" x2="215" y2="280" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="430" y1="0" x2="430" y2="280" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="645" y1="0" x2="645" y2="280" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Left glow orb -->
  <circle cx="0" cy="280" r="180" fill="#4ade80" fill-opacity="0.08"/>
  <!-- Right glow orb -->
  <circle cx="860" cy="0" r="160" fill="#86efac" fill-opacity="0.06"/>

  <!-- Avatar circle -->
  <circle cx="82" cy="82" r="52" fill="#ffffff" fill-opacity="0.08" stroke="#4ade80" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="82" cy="82" r="44" fill="#166534" fill-opacity="0.6"/>
  <text x="82" y="92" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#4ade80">JP</text>

  <!-- Accent line under avatar -->
  <rect x="40" y="145" width="84" height="2" rx="1" fill="url(#accentLine)"/>

  <!-- Name -->
  <text x="160" y="58" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700" fill="#f0fdf4" letter-spacing="-0.5">Justus Putkonen</text>

  <!-- Wave emoji line -->
  <text x="160" y="82" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#86efac">Moi! 👋  ICT-opiskelija · 2. vuosi</text>

  <!-- Info row -->
  <text x="160" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#4ade80">📍</text>
  <text x="178" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#bbf7d0">Kuopio, Finland</text>
  <text x="290" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#4ade80">🎂</text>
  <text x="308" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#bbf7d0">18 vuotta</text>
  <text x="390" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#4ade80">🎓</text>
  <text x="408" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#bbf7d0">Savon ammattiopisto</text>
  <text x="570" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#4ade80">🌐</text>
  <text x="588" y="104" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#bbf7d0">justus45.github.io/CV</text>

