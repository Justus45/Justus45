  <text x="219" y="223" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#86efac">Commits tänä vuonna</text>
  <text x="219" y="245" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#4ade80">–</text>

  <rect x="286" y="204" width="100" height="52" rx="8" fill="url(#cardGrad)" stroke="#4ade80" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="336" y="223" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#86efac">Pull Requests</text>
  <text x="336" y="245" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#4ade80">–</text>

  <rect x="394" y="204" width="90" height="52" rx="8" fill="url(#cardGrad)" stroke="#4ade80" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="439" y="223" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#86efac">Issues</text>
  <text x="439" y="245" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#4ade80">–</text>

  <!-- Contact section -->
  <rect x="500" y="196" width="330" height="68" rx="8" fill="url(#cardGrad)" stroke="#4ade80" stroke-width="0.8" stroke-opacity="0.2"/>
  <text x="516" y="214" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#4ade80" letter-spacing="2">🔗  OTA YHTEYTTÄ</text>
  <text x="516" y="234" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#86efac">✉  justus.putkonen@gmail.com</text>
  <text x="516" y="252" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#86efac">📞  +358 45 614 5772</text>

  <!-- Bottom left branding -->
